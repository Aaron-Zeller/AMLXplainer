###########################################
# CONFIGURATION
###########################################
stages:
  - prepare
  - build
  - deploy:db
  - deploy:app

variables:
  # Helm Timeout.
  # Helm will wait until all deployed resources (pods,ingress,etc) show ready state
  # Increase the timeout if you deploy things that have a long start up time.
  HELM_TIMEOUT: 10m0s
  #
  # Helm chart repository.
  HELM_CHART_MICROSERVICE: oci://${CI_REGISTRY}/ou-ivia-courses/xaiml/2026/helm-chart/ivia-course-microservice-chart
  HELM_CHART_FULLSTACK: oci://${CI_REGISTRY}/ou-ivia-courses/xaiml/2026/helm-chart/ivia-course-fullstack-chart
  HELM_CHART_VERSION: 1.0.4
  #
  # Deploy jobs require K8S_NAMESPACE (GitLab: Settings → CI/CD → Variables, or group variables).
  # If it is unset, --namespace $K8S_NAMESPACE --install is parsed as namespace "--install" and Helm fails.
  #
  # Set the variables POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB here.
  # Do not use existing credentials that are used for other services! The
  # values you enter here will be used to set up a new PostgreSQL database
  # and can be used to access this database later.
  POSTGRES_DB: db_test                 # ⚠️ Set the database name here.
  POSTGRES_USER: user_test             # ⚠️ Set the database user here.
  POSTGRES_PASSWORD: "LsBC7WP7QDPF"  # ‼️ random password generated by the script
  #
  # The following variable contains the PostgreSQL connection string, which
  # can be used to connect to the PostgreSQL database from other services in
  # the same Kubernetes cluster (i.e., your backend service).
  POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${RELEASE_NAME}-postgres.${K8S_NAMESPACE}.svc.cluster.local:5432/${POSTGRES_DB}

default:
  tags:
    - runner-shared

###############################
# SETUP ENVIRONMENT VARIABLES #
###############################

export-environment:
  image:
    name: alpine:3.19.1
    entrypoint: [ "bash" ]
  stage: prepare
  script:
    # Let's Encrypt URLs cannot exceed 63 characters, so we need to truncate the project name.
    - PROJECT_NAME_SHORTENED=$(echo -n ${CI_PROJECT_NAME} | cut -c 1-30 | tr / - | tr . - | tr _ - | tr '[:upper:]' '[:lower:]' | sed -E 's#-+$##')
    - BASE_URL="xaiml26.ivia.isginf.ch"
    - URL_FRONTEND="${PROJECT_NAME_SHORTENED}.${BASE_URL}"
    - URL_BACKEND="be.${PROJECT_NAME_SHORTENED}.${BASE_URL}"
    - URL_API="api.${PROJECT_NAME_SHORTENED}.${BASE_URL}"
    # The release name should be the shortened project name.
    - RELEASE_NAME="${PROJECT_NAME_SHORTENED}"
    # Set image name. This is only set by default if GitLab's Container Registry is enabled for the project.
    - CI_REGISTRY_IMAGE_RAW="${CI_REGISTRY}/${CI_PROJECT_PATH}"
    - CI_REGISTRY_IMAGE="$(echo -n ${CI_REGISTRY_IMAGE_RAW} | tr '[:upper:]' '[:lower:]')"
    # Build jobs authenticate directly with Buildah.
    - SECRET=$(echo -n "${CI_REGISTRY_USER}:${CI_REGISTRY_PWD}" | base64 -w 0)
    - DOCKER_REGISTRY_AUTH="{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"${SECRET}\"}}}"
    # Write all variables to .env file to be used by consecutive stages.
    - echo "CI_REGISTRY_IMAGE=${CI_REGISTRY_IMAGE}" > .env
    - echo "DOCKER_REGISTRY_AUTH=${DOCKER_REGISTRY_AUTH}" >> .env
    - echo "RELEASE_NAME=${RELEASE_NAME}" >> .env
    - echo "URL_FRONTEND=${URL_FRONTEND}" >> .env
    - echo "URL_BACKEND=${URL_BACKEND}" >> .env
    - echo "URL_API=${URL_API}" >> .env
    # For debugging purposes, we print all variables.
    - 'echo "Registry image:   ${CI_REGISTRY_IMAGE}"'
    - 'echo "Release name:     ${RELEASE_NAME}"'
    - 'echo "Frontend URL:     ${URL_FRONTEND}"'
    - 'echo "Backend URL:      ${URL_BACKEND}"'
    - 'echo "Microservice URL: ${URL_API}"'
    - 'echo "Backend URL:    ${URL_FRONTEND}"'
  artifacts:
    reports:
      dotenv: .env
    expire_in: 100 days


########################
# DEFINE TRIGGER RULES #
########################

# App deployment pipeline:
# - Triggered by push, web, or API
# - Branch is master or main
# - Excludes DB maintenance runs
.app-deployment-trigger-rules:
  rules:
    - if: >
        ($CI_PIPELINE_SOURCE == "push" ||
         $CI_PIPELINE_SOURCE == "web" ||
         $CI_PIPELINE_SOURCE == "api") &&
        $DEPLOY_POSTGRES != "true" &&
        ($CI_COMMIT_BRANCH == "master" ||
         $CI_COMMIT_BRANCH == "main")
      when: on_success

###########################################
# DOCKERIZE
###########################################

build:buildah:
  extends: .app-deployment-trigger-rules
  stage: build
  image:
    name: quay.io/buildah/stable:latest
  variables:
    STORAGE_DRIVER: vfs
    BUILDAH_FORMAT: docker
    BUILDAH_LAYERS: "true"
  # Run parallel builds for each app layer.
  parallel:
    matrix:
      - APP_LAYER:
        - frontend
        - backend
        - microservice
  tags:
    - ivialab-student-cluster
  timeout: 30m
  retry: 2
  before_script:
    # Log into the registry before building/pushing images.
    - buildah login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PWD}" "${CI_REGISTRY}"
  script:
    # Define image and cache references.
    - IMG="${CI_REGISTRY_IMAGE}-${APP_LAYER}:latest"
    - CACHE_REF="${CI_REGISTRY}/xaiml26-cache-${APP_LAYER}"
    - |
      if [ "${APP_LAYER}" = "backend" ]; then
        BUILD_CONTEXT="."
        DOCKERFILE_PATH="./backend/Dockerfile"
      else
        BUILD_CONTEXT="./${APP_LAYER}"
        DOCKERFILE_PATH="./Dockerfile"
      fi
    # Build using Buildah with remote layer cache.
    - >
      buildah bud
      --layers
      --cache-from "${CACHE_REF}"
      --cache-to "${CACHE_REF}"
      --file "${DOCKERFILE_PATH}"
      --tag "${IMG}"
      "${BUILD_CONTEXT}"
    - buildah push "${IMG}"


###########################################
# DEPLOY
###########################################

.deploy-template:
  image:
    name: alpine/helm:3.14.1
    entrypoint: [ "bash" ]
  before_script:
    # Decode kubeconfig from CI variable (base64-encoded kubeconfig content).
    - mkdir -p "${CI_PROJECT_DIR}/.kube"
    - echo "${KUBECONFIG_B64}" | base64 -d > "${CI_PROJECT_DIR}/.kube/config"
    - chmod 600 "${CI_PROJECT_DIR}/.kube/config"
    - export KUBECONFIG="${CI_PROJECT_DIR}/.kube/config"
    - |
      if [ -z "${K8S_NAMESPACE}" ]; then
        echo "ERROR: K8S_NAMESPACE is not set. Add it under CI/CD variables (project or group)."
        echo "An empty namespace makes Helm treat the next flag (--install) as the namespace name."
        exit 1
      fi
    # Log into docker registry.
    - echo ${CI_REGISTRY_PWD} | helm registry login -u ${CI_REGISTRY_USER} --password-stdin ${CI_REGISTRY}

deploy-postgres:
  extends: .deploy-template
  stage: deploy:db
  resource_group: postgres-deploy
  rules:
    - if: >
        ($CI_PIPELINE_SOURCE == "web" ||
         $CI_PIPELINE_SOURCE == "api") &&
        $DEPLOY_POSTGRES == "true" &&
        ($CI_COMMIT_BRANCH == "master" ||
         $CI_COMMIT_BRANCH == "main")
      when: manual
  script:
    # PostgreSQL maintenance is handled in a dedicated manual pipeline run.
    # To log into your PostgreSQL database from your local machine, set up a port-forwarding:
    #   1) Use `k9s` to connect to the Kubernetes cluster.
    #   2) Select the resource type `pod`.
    #   3) Find the pod name of your PostgreSQL database.
    #   4) Press `[SHIFT]+[F]` to port-forward the pod.
    # You can now connect to the PostgreSQL database using the values of the
    # POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB variables.
    - >
      helm upgrade
      ${RELEASE_NAME}-postgres
      ${HELM_CHART_MICROSERVICE}
      --namespace "${K8S_NAMESPACE}"
      --install
      --atomic
      -f "helm/postgres.yaml"
      --timeout "${HELM_TIMEOUT}"
      --set extraEnv.POSTGRES_DB="${POSTGRES_DB}"
      --set extraEnv.POSTGRES_USER="${POSTGRES_USER}"
      --set extraEnv.POSTGRES_PASSWORD="${POSTGRES_PASSWORD}"

deploy-microservice:
  extends:
    - .deploy-template
    - .app-deployment-trigger-rules
  stage: deploy:app
  resource_group: microservice-deploy
  script:
    - >
      helm upgrade
      ${RELEASE_NAME}-microservice
      ${HELM_CHART_MICROSERVICE}
      --namespace "${K8S_NAMESPACE}"
      --install
      --atomic
      -f "helm/microservice.yaml"
      --timeout "${HELM_TIMEOUT}"
      --set image.repository="${CI_REGISTRY_IMAGE}-microservice"
      --set url="${URL_API}"
      --set extraEnv.CORS_ORIGINS="${URL_FRONTEND}"

repair-app-release:
  extends: .deploy-template
  stage: deploy:app
  resource_group: app-deploy
  rules:
    - if: >
        ($CI_PIPELINE_SOURCE == "push" ||
         $CI_PIPELINE_SOURCE == "web" ||
         $CI_PIPELINE_SOURCE == "api") &&
        ($CI_COMMIT_BRANCH == "master" ||
         $CI_COMMIT_BRANCH == "main")
      when: manual
  script:
    - helm status "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}" || true
    - helm history "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}" || true
    - |
      RELEASE_STATUS="$(helm status "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}" 2>/dev/null | awk -F': ' '/^STATUS:/ {print $2}')"
      echo "Current Helm status for ${RELEASE_NAME}: ${RELEASE_STATUS:-not installed}"
      if [[ "${RELEASE_STATUS}" == pending-* ]]; then
        DEPLOYED_REVISION="$(helm history "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}" 2>/dev/null | grep -E '[[:space:]]deployed[[:space:]]' | tail -n 1 | awk '{print $1}')"
        if [ -n "${DEPLOYED_REVISION}" ]; then
          echo "Rolling ${RELEASE_NAME} back to deployed Helm revision ${DEPLOYED_REVISION}."
          helm rollback "${RELEASE_NAME}" "${DEPLOYED_REVISION}" --namespace "${K8S_NAMESPACE}" --wait --timeout "${HELM_TIMEOUT}"
        else
          echo "No deployed revision exists for ${RELEASE_NAME}; uninstalling the stuck release."
          helm uninstall "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}"
        fi
      else
        echo "No pending Helm operation found for ${RELEASE_NAME}."
      fi
    - helm status "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}" || true
    - helm history "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}" || true

deploy-app:
  extends:
    - .deploy-template
    - .app-deployment-trigger-rules
  stage: deploy:app
  resource_group: app-deploy
  script:
    - |
      RELEASE_STATUS="$(helm status "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}" 2>/dev/null | awk -F': ' '/^STATUS:/ {print $2}')"
      echo "Current Helm status for ${RELEASE_NAME}: ${RELEASE_STATUS:-not installed}"
      if [[ "${RELEASE_STATUS}" == pending-* ]]; then
        DEPLOYED_REVISION="$(helm history "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}" 2>/dev/null | grep -E '[[:space:]]deployed[[:space:]]' | tail -n 1 | awk '{print $1}')"
        if [ -n "${DEPLOYED_REVISION}" ]; then
          echo "Found pending Helm operation; rolling back to deployed revision ${DEPLOYED_REVISION} before upgrade."
          helm rollback "${RELEASE_NAME}" "${DEPLOYED_REVISION}" --namespace "${K8S_NAMESPACE}" --wait --timeout "${HELM_TIMEOUT}"
        else
          echo "Found pending Helm operation with no deployed revision; uninstalling stuck release before upgrade."
          helm uninstall "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}"
        fi
      fi
    - >
      helm upgrade
      ${RELEASE_NAME}
      ${HELM_CHART_FULLSTACK}
      --version ${HELM_CHART_VERSION}
      --namespace "${K8S_NAMESPACE}"
      --install
      --atomic
      -f "helm/app.yaml"
      --timeout "${HELM_TIMEOUT}"
      --set frontend.image.repository="${CI_REGISTRY_IMAGE}-frontend"
      --set frontend.url="${URL_FRONTEND}"
      --set backend.image.repository="${CI_REGISTRY_IMAGE}-backend"
      --set backend.url="${URL_BACKEND}"
      --set backend.extraEnv.POSTGRES_URL="${POSTGRES_URL}"
      --set backend.extraEnv.CORS_ORIGINS="https://${URL_FRONTEND}"
  environment:
    url: https://$URL_FRONTEND
    name: $CI_PROJECT_NAME/$CI_COMMIT_REF_SLUG
